<!-- index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family City Hotel Room Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="hero">
    <div class="overlay">
      <h1>Family City Hotel Reservation</h1>
      <p>Elegant Room Management System</p>
    </div>
  </header>

  <main class="container">
    <div class="toolbar">
      <div>
        <h2>Daftar Kamar Hotel</h2>
        <p class="subtitle">Kelola informasi kamar tanpa backend. Tambah, edit, hapus, dan lihat detail.</p>
      </div>
      <button id="add-room-button" class="btn-primary">Tambah Kamar</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>No. Kamar</th>
            <th>Foto Kamar</th>
            <th>Tipe Kamar</th>
            <th>Harga / Malam</th>
            <th>Lantai</th>
            <th>Status</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="room-table-body"></tbody>
      </table>
    </div>
  </main>

  <div id="form-overlay" class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="form-title">Tambah Kamar Baru</h3>
      </div>
      <form id="room-form">
        <div class="form-grid">
          <label>
            No. Kamar
            <input type="text" name="number" required placeholder="Contoh: 308">
          </label>
          <label>
            Foto Kamar
            <input type="text" name="image" placeholder="URL gambar / images/standard-room.jpg">
          </label>
          <label>
            Tipe Kamar
            <select name="type" required>
              <option value="Standard">Standard</option>
              <option value="Deluxe">Deluxe</option>
              <option value="Suite">Suite</option>
            </select>
          </label>
          <label>
            Harga / Malam
            <input type="text" name="price" required placeholder="Rp850.000">
          </label>
          <label>
            Lantai
            <input type="number" name="floor" required min="1" placeholder="Contoh: 4">
          </label>
          <label>
            Status
            <select name="status" required>
              <option value="Available">Available</option>
              <option value="Occupied">Occupied</option>
              <option value="Maintenance">Maintenance</option>
            </select>
          </label>
        </div>
        <div class="modal-actions">
          <button type="button" id="cancel-button" class="btn-secondary">Batal</button>
          <button type="submit" id="save-room-button" class="btn-primary">Simpan Kamar</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
